{% extends "base.html" %}

{% block title %}Forgot Password - DriveSmart{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="col-md-7 col-lg-5">
        <div class="ds-auth-card">
            <div class="ds-auth-header">
                <div class="ds-avatar lg mx-auto mb-2">
                    <i class="fas fa-key"></i>
                </div>
                <h4>Forgot Your Password?</h4>
                <p>Enter your email address and we'll send you a link to reset it</p>
            </div>
            <div class="ds-auth-body">
                <form method="post" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control form-control-lg"
                               id="email" name="email" placeholder="Enter your registered email" required>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-gradient btn-lg">
                            <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                        </button>
                    </div>
                </form>

                <div class="text-center">
                    <p class="text-muted small mb-0">
                        Remember your password? <a href="{{ url_for('auth.login') }}" class="fw-bold">Sign in</a>
                    </p>
                    <p class="text-muted small mb-0 mt-1">
                        Don't have an account? <a href="{{ url_for('auth.register') }}" class="fw-bold">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
