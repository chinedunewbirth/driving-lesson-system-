{% extends "base.html" %}

{% block title %}Reset Password - DriveSmart{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="col-md-7 col-lg-5">
        <div class="ds-auth-card">
            <div class="ds-auth-header">
                <div class="ds-avatar lg mx-auto mb-2">
                    <i class="fas fa-lock-open"></i>
                </div>
                <h4>Set a New Password</h4>
                <p>Choose a strong password for your account</p>
            </div>
            <div class="ds-auth-body">
                <form method="post" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="password" class="form-label">New Password</label>
                        <input type="password" class="form-control form-control-lg"
                               id="password" name="password" placeholder="At least 6 characters" required minlength="6">
                        <div id="pw-strength-msg" class="mt-1" style="display:none"></div>
                    </div>

                    <div class="mb-4">
                        <label for="password2" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control form-control-lg"
                               id="password2" name="password2" placeholder="Repeat your new password" required>
                        <div id="pw-match-msg" class="mt-1" style="display:none"></div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-gradient btn-lg" id="reset-btn">
                            <i class="fas fa-check me-2"></i>Reset Password
                        </button>
                    </div>
                </form>

                <div class="text-center">
                    <p class="text-muted small mb-0">
                        <a href="{{ url_for('auth.login') }}" class="fw-bold">Back to Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    var pw = document.getElementById('password');
    var pw2 = document.getElementById('password2');
    var strengthMsg = document.getElementById('pw-strength-msg');
    var matchMsg = document.getElementById('pw-match-msg');
    var btn = document.getElementById('reset-btn');

    function checkStrength() {
        var val = pw.value;
        if (!val.length) { strengthMsg.style.display = 'none'; return; }
        var score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        var labels = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
        var colors = ['#dc3545', '#fd7e14', '#ffc107', '#20c997', '#198754'];
        var idx = Math.min(score, 4);
        strengthMsg.style.display = 'block';
        strengthMsg.innerHTML = '<small style="color:' + colors[idx] + '"><i class="fas fa-shield-alt me-1"></i>' + labels[idx] + '</small>';
    }

    function checkMatch() {
        if (!pw2.value.length) { matchMsg.style.display = 'none'; return; }
        matchMsg.style.display = 'block';
        if (pw.value === pw2.value) {
            matchMsg.innerHTML = '<small class="text-success"><i class="fas fa-check-circle me-1"></i>Passwords match</small>';
        } else {
            matchMsg.innerHTML = '<small class="text-danger"><i class="fas fa-times-circle me-1"></i>Passwords do not match</small>';
        }
    }

    function updateBtn() {
        btn.disabled = pw.value.length < 6 || pw.value !== pw2.value;
    }

    pw.addEventListener('input', function () { checkStrength(); checkMatch(); updateBtn(); });
    pw2.addEventListener('input', function () { checkMatch(); updateBtn(); });
    updateBtn();
});
</script>
{% endblock %}
