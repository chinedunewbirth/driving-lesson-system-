{% extends "base.html" %}

{% block content %}
<div class="jumbotron">
    <h1 class="display-4">Welcome to DriveSmart Driving School</h1>
    <p class="lead">Learn to drive with our experienced instructors. Book lessons online easily.</p>
    <hr class="my-4">
    <p>Get started by registering as a student or instructor.</p>
    {% if current_user.is_anonymous %}
    <a class="btn btn-primary btn-lg" href="{{ url_for('auth.register') }}" role="button">Register</a>
    <a class="btn btn-secondary btn-lg" href="{{ url_for('auth.login') }}" role="button">Login</a>
    {% endif %}
</div>
{% endblock %}
