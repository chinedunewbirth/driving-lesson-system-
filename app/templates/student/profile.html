{% extends "base.html" %}

{% block content %}
<h2>Student Profile</h2>
<form method="post">
    {{ form.hidden_tag() }}
    <div class="mb-3">
        {{ form.phone.label(class="form-label") }}
        {{ form.phone(class="form-control") }}
        {% for error in form.phone.errors %}
        <span class="text-danger">{{ error }}</span>
        {% endfor %}
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
