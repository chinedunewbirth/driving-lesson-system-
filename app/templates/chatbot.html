{% extends "base.html" %}

{% block content %}
<h2>AI Assistant</h2>
<p>Ask me anything about driving lessons.</p>

<div id="chat-container" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll;">
    <div id="chat-messages"></div>
</div>

<form id="chat-form" method="post">
    {{ form.hidden_tag() }}
    <div class="input-group mt-3">
        {{ form.message(class="form-control", placeholder="Type your message...", id="message") }}
        <button class="btn btn-primary" type="submit">Send</button>
    </div>
</form>

<script>
document.getElementById('chat-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var formData = new FormData(this);
    fetch("{{ url_for('chatbot.chatbot') }}", {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        var messages = document.getElementById('chat-messages');
        var userMsg = document.createElement('p');
        userMsg.innerHTML = '<strong>You:</strong> ' + formData.get('message');
        messages.appendChild(userMsg);
        var botMsg = document.createElement('p');
        botMsg.innerHTML = '<strong>Bot:</strong> ' + data.response;
        messages.appendChild(botMsg);
        document.getElementById('message').value = '';
        var container = document.getElementById('chat-container');
        container.scrollTop = container.scrollHeight;
    });
});
</script>
{% endblock %}
