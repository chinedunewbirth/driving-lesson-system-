name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Lint & Static Analysis ────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    - name: Install linting tools
      run: pip install flake8
    - name: Flake8 lint
      run: |
        flake8 app/ tests/ config.py run.py \
          --max-line-length 120 \
          --exclude __pycache__,migrations \
          --count --show-source --statistics

  # ── Unit Tests (SQLite, no services) ──────────────────
  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run unit tests
      env:
        SECRET_KEY: ci-test-secret-key
        USE_AI_CHATBOT: 'false'
      run: |
        pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml
    - name: Upload coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-unit
        path: coverage.xml

  # ── Integration Tests (PostgreSQL + Redis) ────────────
  test-integration:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: driving_school_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/driving_school_test
        SECRET_KEY: ci-test-secret-key
        REDIS_URL: redis://localhost:6379/0
        USE_AI_CHATBOT: 'false'
        FLASK_APP: run.py
      run: |
        flask db upgrade
    - name: Run tests against PostgreSQL
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/driving_school_test
        SECRET_KEY: ci-test-secret-key
        REDIS_URL: redis://localhost:6379/0
        USE_AI_CHATBOT: 'false'
      run: |
        pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml
    - name: Upload coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-integration
        path: coverage.xml

  # ── Docker Build ──────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t driving-lesson-system:ci .
    - name: Start services with Docker Compose
      run: |
        docker compose up -d
        sleep 10
    - name: Health check
      run: |
        for i in 1 2 3 4 5; do
          status=$(docker compose exec -T web curl -sf -o /dev/null -w "%{http_code}" http://localhost:5000/health || echo "000")
          echo "Attempt $i: HTTP $status"
          [ "$status" = "200" ] && exit 0
          sleep 5
        done
        echo "Health check failed"
        docker compose logs web
        exit 1
    - name: Tear down
      if: always()
      run: docker compose down -v

  # ── Security Scan ─────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: pip
    - name: Install safety
      run: pip install pip-audit
    - name: Audit dependencies
      run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-62 || true